<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Learn Arabic Hub</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Learn Arabic Hub</h1>
<p>Netflix Style Arabic Learning</p>
</header>

<!-- TOP AD -->
<div class="adBox">
<script async="async" data-cfasync="false" src="https://pl29654368.effectivecpmnetwork.com/44bb4a9533dbad4b8bcfa25555e2f930/invoke.js"></script>
<div id="container-44bb4a9533dbad4b8bcfa25555e2f930"></div>
</div>

<!-- PROGRESS -->
<section class="progressBox">

<div class="progressText">
<span id="progressText">Completed: 0 / 0</span>
</div>

<div class="progressBar">
<div id="progressFill"></div>
</div>

<div id="completeMessage"></div>

<button class="resetBtn" onclick="resetProgress()">
Reset Progress
</button>

</section>

<!-- STATISTICS -->
<section class="statsBox">

<div class="statCard">
<h3 id="totalLessons">0</h3>
<p>Total Lessons</p>
</div>

<div class="statCard">
<h3 id="completedLessons">0</h3>
<p>Completed</p>
</div>

<div class="statCard">
<h3 id="favoriteLessons">0</h3>
<p>Favorites</p>
</div>

</section>

<!-- SECOND AD -->
<div class="adBox small">

<script>
atOptions = {
'key' : '982c56d4575c11c305684c514c771985',
'format' : 'iframe',
'height' : 60,
'width' : 468,
'params' : {}
};
</script>

<script src="https://www.highperformanceformat.com/982c56d4575c11c305684c514c771985/invoke.js"></script>

</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none;text-align:center;">

<button
onclick="openAddModal()"
class="resetBtn"
style="background:#00ff88;color:black;font-weight:bold;"
>
+ Add New Lesson
</button>

</div>

<!-- ADD MODAL -->
<div id="addModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeAddModal()">×</span>

<h2>Add Lesson</h2>

<input
id="titleInput"
placeholder="Lesson Title"
>

<select id="categoryInput">

<option value="Beginner Arabic">
Beginner Arabic
</option>

<option value="Daily Arabic">
Daily Arabic
</option>

<option value="Arabic Conversations">
Arabic Conversations
</option>

<option value="Arabic Stories">
Arabic Stories
</option>

</select>

<input
id="videoInput"
placeholder="YouTube URL"
>

<input
id="pdfInput"
placeholder="PDF URL"
>

<input
id="thumbInput"
placeholder="Thumbnail URL (Optional)"
>

<button
onclick="addLesson()"
class="resetBtn"
>
Save Lesson
</button>

</div>

</div>

<!-- EDIT MODAL -->

<div id="editModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeEditModal()">×</span>

<h2>Edit Lesson</h2>

<input id="editTitle">

<select id="editCategory">

<option value="Beginner Arabic">
Beginner Arabic
</option>

<option value="Daily Arabic">
Daily Arabic
</option>

<option value="Arabic Conversations">
Arabic Conversations
</option>

<option value="Arabic Stories">
Arabic Stories
</option>

</select>

<input id="editVideo">
<input id="editPdf">
<input id="editThumb">

<button
onclick="saveEditLesson()"
class="resetBtn"
>
Save Changes
</button>

</div>

</div>

<!-- SEARCH -->

<section class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search lessons..."
>

</section>

<!-- CATEGORIES -->

<section class="categories">

<button onclick="filterLessons('All')">
All
</button>

<button onclick="filterLessons('Beginner Arabic')">
Beginner
</button>

<button onclick="filterLessons('Daily Arabic')">
Daily
</button>

<button onclick="filterLessons('Arabic Conversations')">
Conversations
</button>

<button onclick="filterLessons('Arabic Stories')">
Stories
</button>

<button onclick="showFavorites()">
❤️ Favorites
</button>

</section>

<!-- LESSONS -->

<div id="lessonContainer"></div>

<!-- MID AD -->

<div class="adBox">

<script src="https://pl29654629.effectivecpmnetwork.com/81/da/59/81da59aad81753d5a04e68ec3b6eb197.js"></script>

</div>

<!-- VIDEO MODAL -->

<div id="videoModal" class="modal">

<div class="modal-content">

<span
class="close"
onclick="closeVideo()"
>
×
</span>

<iframe
id="videoFrame"
frameborder="0"
allowfullscreen>
</iframe>

<button
id="completeBtn"
onclick="toggleComplete()"
>
Mark as Completed
</button>

</div>

</div>

<!-- FLOATING AD -->

<div class="floatingAd">

<script>
atOptions = {
'key' : '69826c996ec42c0c258869697dd8c1b1',
'format' : 'iframe',
'height' : 250,
'width' : 300,
'params' : {}
};
</script>

<script src="https://www.highperformanceformat.com/69826c996ec42c0c258869697dd8c1b1/invoke.js"></script>

</div>

<script>
atOptions = {
'key' : '3e938241e9f6bf2f59c1e736b9ebfc0b',
'format' : 'iframe',
'height' : 600,
'width' : 160,
'params' : {}
};
</script>

<script src="https://www.highperformanceformat.com/3e938241e9f6bf2f59c1e736b9ebfc0b/invoke.js"></script>

<script src="data.js"></script>
<script src="main.js"></script>

</body>
</html>
