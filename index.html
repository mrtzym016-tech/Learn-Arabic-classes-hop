<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Learn Arabic Hub</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Learn Arabic Hub</h1>
<p>Netflix Style Arabic Learning</p>
</header>

<!-- 🔥 TOP AD -->
<div class="adBox">
<script async="async" data-cfasync="false" src="https://pl29654368.effectivecpmnetwork.com/44bb4a9533dbad4b8bcfa25555e2f930/invoke.js"></script>
<div id="container-44bb4a9533dbad4b8bcfa25555e2f930"></div>
</div>

<!-- PROGRESS -->
<section class="progressBox">
<div class="progressText">
<span id="progressText">Completed: 0 / 0</span>
</div>

<div class="progressBar">
<div id="progressFill"></div>
</div>

<div id="completeMessage"></div>

<button class="resetBtn" onclick="resetProgress()">Reset Progress</button>
</section>

<!-- SECOND AD -->
<div class="adBox small">
<script>
atOptions = {
'key' : '982c56d4575c11c305684c514c771985',
'format' : 'iframe',
'height' : 60,
'width' : 468,
'params' : {}
};
</script>
<script src="https://www.highperformanceformat.com/982c56d4575c11c305684c514c771985/invoke.js"></script>
</div>

<!-- 🔐 ADMIN BUTTON (HIDDEN BY DEFAULT) -->
<div id="adminPanel" style="text-align:center; display:none;">
<button onclick="openAddModal()" class="resetBtn"
style="background:#00ff88;color:black;font-weight:bold;">
+ Add New Lesson (Admin)
</button>
</div>

<!-- ADD MODAL -->
<div id="addModal" class="modal">
<div class="modal-content">

<span class="close" onclick="closeAddModal()">×</span>

<h2>Add Lesson</h2>

<input id="titleInput" placeholder="Title">
<input id="videoInput" placeholder="YouTube Embed URL">
<input id="pdfInput" placeholder="PDF Link">
<input id="thumbInput" placeholder="Thumbnail URL (optional)">

<button onclick="addLesson()" class="resetBtn">Save</button>

</div>
</div>

<section class="search-box">
<input type="text" id="searchInput" placeholder="Search lessons...">
</section>

<section class="categories">
<button onclick="filterLessons('All')">All</button>
<button onclick="filterLessons('Beginner Arabic')">Beginner</button>
<button onclick="filterLessons('Daily Arabic')">Daily</button>
<button onclick="filterLessons('Arabic Conversations')">Conversations</button>
</section>

<div id="lessonContainer"></div>

<!-- 🔥 MID AD -->
<div class="adBox">
<script src="https://pl29654629.effectivecpmnetwork.com/81/da/59/81da59aad81753d5a04e68ec3b6eb197.js"></script>
</div>

<!-- VIDEO MODAL -->
<div id="videoModal" class="modal">
<div class="modal-content">

<span class="close" onclick="closeVideo()">×</span>

<iframe id="videoFrame" frameborder="0" allowfullscreen></iframe>

<button id="completeBtn" onclick="toggleComplete()">
Mark as Completed
</button>

</div>
</div>

<!-- SIDE AD -->
<div class="floatingAd">

</body>
</html>
