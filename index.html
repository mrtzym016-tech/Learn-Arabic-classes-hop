<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Learn Arabic Hub</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Learn Arabic Hub</h1>
<p>Netflix Style Arabic Learning</p>
</header>
<section class="progress-section">

<h2>Your Progress</h2>

<div class="progress-bar">

<div id="progressFill"></div>

</div>

<p id="progressText">
0 / 0 Completed
</p>

<div id="certificateMessage"></div>

</section>
<section class="search-box">
<input type="text" id="searchInput" placeholder="Search lessons...">
</section>

<section class="categories">
<button onclick="filterLessons('All')">All</button>
<button onclick="filterLessons('Beginner Arabic')">Beginner</button>
<button onclick="filterLessons('Daily Arabic')">Daily</button>
<button onclick="filterLessons('Arabic Conversations')">Conversations</button>
</section>

<div id="lessonContainer"></div>

<!-- 🔥 VIDEO MODAL -->
<div id="videoModal" class="modal">
<div class="modal-content">

<span class="close" onclick="closeVideo()">×</span>

<iframe id="videoFrame" frameborder="0" allowfullscreen></iframe>

<button id="completeBtn" onclick="toggleComplete()">
Mark as Completed
</button>

</div>
</div>

<script src="data.js"></script>
<script src="main.js"></script>

</body>
</html>
